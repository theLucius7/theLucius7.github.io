baseURL = "https://blog.lucius7.dev"
languageCode = "zh-cn"
title = "hi, I'm Lucius7🥺"

[taxonomies]
  tag      = "tags"
  category = "categories"
  series   = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark.extensions.passthrough]
  enable = true
  [markup.goldmark.extensions.passthrough.delimiters]
    block  = [['\[', '\]'], ['$$', '$$']]   # ✅ 单引号 + 单反斜杠
    inline = [['\(', '\)']]                 # ✅ 单引号 + 单反斜杠
  [markup.highlight]
    style              = "monokai"
    lineNos            = true
    lineNumbersInTable = true
    guessSyntax        = true

[params]
  env         = "production"
  author      = "Lucius7"
  description = "OIer / XCPCer / DevOps"
  math        = true
  defaultTheme    = "auto"
  ShowReadingTime       = true
  ShowWordCount         = true
  ShowCodeCopyButtons   = true
  ShowPostNavLinks      = true
  ShowBreadCrumbs       = true
  ShowToc               = true
  TocOpen               = false
  ShowRssButtonInSectionTermList = true

  [params.profileMode]
    enabled     = true
    title       = "hi, I'm Lucius7 🥺"
    subtitle    = "OIer / XCPCer / DevOps<Developer />"
    imageUrl    = "https://avatars.githubusercontent.com/u/59860644?v=4"
    imageWidth  = "120"
    imageHeight = "120"
    imageTitle  = "Lucius7"



